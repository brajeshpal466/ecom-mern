version: '3.9'

services:
  backend:
    build:
      context: ./backend
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongo:27017/ecom
      - CORS_ORIGIN=http://localhost:3000
    ports:
      - '5001:5001'
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  frontend:
    build:
      context: ./frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
    environment:
      - REACT_APP_API_BASE_URL=http://backend:5001

volumes:
  mongo-data:

